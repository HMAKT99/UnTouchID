name: TouchBridge
options:
  bundleIdPrefix: dev.touchbridge
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  TouchBridge:
    type: application
    platform: iOS
    sources:
      - path: TouchBridge
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: TouchBridge/Assets.xcassets
      - path: TouchBridge/Resources
        excludes:
          - "Info.plist"
    info:
      path: TouchBridge/Resources/Info.plist
      properties:
        CFBundleDisplayName: TouchBridge
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSFaceIDUsageDescription: "TouchBridge needs Face ID or Touch ID to authenticate on behalf of your Mac."
        NSBluetoothAlwaysUsageDescription: "TouchBridge uses Bluetooth to communicate with your Mac."
        UIBackgroundModes:
          - bluetooth-central
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: TouchBridge/TouchBridge.entitlements
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: TouchBridge/TouchBridge.entitlements
        INFOPLIST_FILE: TouchBridge/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.touchbridge.companion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

  TouchBridgeWatch:
    type: application
    platform: watchOS
    sources:
      - path: TouchBridgeWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.touchbridge.companion.watchapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: dev.touchbridge.companion
        SWIFT_VERSION: "5.9"
